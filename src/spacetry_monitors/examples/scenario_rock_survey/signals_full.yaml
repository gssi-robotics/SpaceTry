# signals_full.yaml — Rock Survey at Ridge
# Variable mapping for RiTMOS monitor synthesis.

obstacle_too_close:
  kind: internal
  datatype: bool

cmd_move_stop:
  kind: output
  ros_topic: /move_stop
  msg_type: std_srvs/srv/Empty
  datatype: bool

cmd_move_forward:
  kind: output
  ros_topic: /move_forward
  msg_type: std_srvs/srv/Empty
  datatype: bool

rover_linear_velocity:
  kind: input
  ros_topic: /model/curiosity_mars_rover/odometry
  msg_type: nav_msgs/msg/Odometry
  field: twist.twist.linear.x
  datatype: float

obstacle_min_range:
  kind: input
  ros_topic: /scan
  msg_type: sensor_msgs/msg/LaserScan
  field: ranges
  datatype: float

at_waypoint:
  kind: internal
  datatype: bool

rover_position_x:
  kind: input
  ros_topic: /model/curiosity_mars_rover/odometry
  msg_type: nav_msgs/msg/Odometry
  field: pose.pose.position.x
  datatype: float

rover_position_y:
  kind: input
  ros_topic: /model/curiosity_mars_rover/odometry
  msg_type: nav_msgs/msg/Odometry
  field: pose.pose.position.y
  datatype: float
