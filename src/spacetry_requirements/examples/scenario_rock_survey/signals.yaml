signals:
- {name: rover_linear_velocity, type: float64, topic: /model/curiosity_mars_rover/odometry}
- {name: obstacle_min_range, type: float64, topic: /scan}
- {name: rover_position_y, type: float64, topic: /model/curiosity_mars_rover/odometry}
- {name: rover_position_x, type: float64, topic: /model/curiosity_mars_rover/odometry}
- {name: cmd_move_stop, type: bool, topic: /move_stop}
- {name: cmd_move_forward, type: bool, topic: /move_forward}
numeric_bools:
- {name: obstacle_too_close, expr: obstacle_min_range < 1.0}
