scenario_id: autonomy_uncertainty_eval_01
mission_goal: science_rock_01
report_path: /tmp/spacetry_autonomy_report.json
monitoring:
  tick_hz: 10.0
  min_motion_linear_x: 0.2
  contingency_turn_rate: 0.35
  low_battery_threshold: 0.2
  stable_window_s: 2.0
  max_runtime_s: 90.0
events:
  - id: decision_scan_dropout
    category: perception
    injection_timing: decision_point
    intensity_increase: gradual
    trigger:
      type: first_motion
    injector:
      type: scan_dropout
      duration_s: 6.0
      base_intensity: 0.35
      max_intensity: 0.95
      step: 0.20
      front_sector_deg: 30.0
    reaction:
      linear_delta: 0.35
      angular_delta: 0.25
      reaction_timeout_s: 12.0
      recovery_timeout_s: 20.0
  - id: mid_action_dynamic_obstacle
    category: obstacle
    injection_timing: mid_action
    intensity_increase: sudden
    trigger:
      type: distance_travelled
      distance_m: 8.0
    injector:
      type: scan_obstacle
      duration_s: 5.0
      base_intensity: 0.55
      max_intensity: 0.95
      step: 0.15
      front_sector_deg: 22.0
      obstacle_distance_m: 0.9
    reaction:
      linear_delta: 0.45
      angular_delta: 0.35
      reaction_timeout_s: 10.0
      recovery_timeout_s: 24.0
  - id: contingency_battery_shock
    category: resource
    injection_timing: contingency
    intensity_increase: cascading
    trigger:
      type: contingency_active
    injector:
      type: battery_override
      duration_s: 8.0
      base_intensity: 0.55
      max_intensity: 0.95
      step: 0.20
      override_soc: 0.18
      force_near_outpost: false
    reaction:
      linear_delta: 0.25
      angular_delta: 0.20
      reaction_timeout_s: 14.0
      recovery_timeout_s: 30.0
