scenario_name: spacetry_scenario_navigation_obstacle_sensing_coupled
world_name: mars_outpost

route:
  start:
    name: dock_pad_01
    x: 0.0
    y: 0.0
    yaw: 0.0
  goal:
    name: science_rock_01
    x: 50.10
    y: -80.0
    yaw: 3.07
    tolerance_m: 1.5

baseline_world:
  outpost:
    name: outpost_habitat_01
    x: 66.0
    y: 0.0
  hazards:
    - name: block_island
      x: 20.0
      y: -40.5
      context_radius_m: 16.0

trigger:
  min_trigger_time_s: 25.0
  min_progress_ratio: 0.18
  max_progress_ratio: 0.82
  min_forward_speed_mps: 0.6
  sustained_progress_window_s: 4.0
  min_distance_from_baseline_hazard_m: 16.0
  min_remaining_goal_distance_m: 18.0
  require_monitor_quiet: true

injection:
  obstacle:
    model_name: rock_5
    entity_name_prefix: injected_blocking_rock
    spawn_ahead_distance_m: 9.0
    lateral_offset_m: 0.0
    z_offset_from_rover_m: -1.2
    yaw_offset_rad: 0.0
    verification_retries: 6
    verification_retry_period_s: 1.0
  perception_degradation:
    enabled: true
    duration_s: 30.0
    publish_hz: 15.0
    ramp_up_s: 8.0
    clear_bias_start: 0.20
    clear_bias_end: 0.55
    lateral_flip_bias: 0.20
    hold_last_bias: 0.15
    random_seed: 42

attribution:
  obstacle_threshold_m: 9.0
  encounter_distance_m: 11.0
  encounter_heading_half_angle_deg: 40.0
  fault_distance_margin_from_baseline_hazard_m: 4.0
  reaction_window_s: 12.0
  cmd_vel_drop_threshold_mps: 0.45
  cmd_vel_turn_threshold_radps: 0.45
  stable_avoidance_window_s: 2.5
  stable_progress_window_s: 3.0
  collision_distance_m: 2.5

evaluation:
  scenario_timeout_s: 1300.0
  minimum_post_encounter_observation_window_s: 40.0

rosbag:
  enabled: true
  topics:
    - /clock
    - /scan
    - /cmd_vel
    - /mobile_base_controller/odom
    - /obstacle/front
    - /obstacle/left
    - /obstacle/right
    - /obstacle/state
    - /battery/soc
    - /battery/near_outpost
    - /monitor/events
    - /monitor/handlerMR_009_RETURN_TO_OUTPOST_ON_LOW_BATTERY
    - /monitor/handlerMR_011_MAINTAIN_SPEED_WHEN_FULL_BATTERY
