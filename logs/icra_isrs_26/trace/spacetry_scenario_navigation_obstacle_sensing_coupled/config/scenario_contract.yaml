scenario_name: spacetry_scenario_navigation_obstacle_sensing_coupled
autonomy_aspect: behavior flexibility
uncertainty_location:
  - environment
  - managed system
fault_subject:
  - nominal_route_segment_to_science_rock_01
  - rover_perception_interpretation
fault_attribute:
  - route_blocking_rock_presence
  - obstacle_classification_state
manifestation:
  obstacle_blocking: stuck
  perception_interpretation: degrading
space_domain:
  obstacle_blocking: isolated
  perception_interpretation: isolated
time_domain:
  obstacle_blocking: permanent
  perception_interpretation: transient
trigger: rover_state_predicate(progress_ratio, hazard_clearance, monitor_quiet, forward_progress)
primary_evaluation_target: navigation autonomy under runtime obstacle blocking on the route to science_rock_01
secondary_injected_uncertainties:
  - degraded obstacle interpretation on derived obstacle classification topics
interaction_hypothesis: Degraded obstacle interpretation delays or destabilizes the rover's response to a newly inserted blocking rock and can slow or perturb recovery.
baseline_uncertainties:
  - The baseline world already contains block_island near the nominal route and it may trigger obstacle avoidance before any new fault is injected.
  - The BT relies on best-effort odometry and obstacle freshness windows, so timing and transport can affect perceived obstacle state.
  - MR_011 can dominate runs when battery_soc is above 0.8 because the baseline BT nominal linear speed is 1.6 m/s; this scenario starts below that antecedent to avoid unrelated monitor dominance.
injected_uncertainties:
  - name: runtime_blocking_rock
    uncertainty_location: environment
    fault_subject: rock obstacle on nominal route
    fault_attribute: blocking obstacle presence
    manifestation: stuck
    time_domain: permanent
    space_domain: isolated
  - name: degraded_obstacle_interpretation
    uncertainty_location: managed system
    fault_subject: derived obstacle classification
    fault_attribute: obstacle state labels
    manifestation: degrading
    time_domain: transient
    space_domain: isolated
baseline_map_assessment: The evaluated goal is the existing science_rock_01 target at (50.10, -80.0). The baseline route from dock_pad_01 intersects the vicinity of block_island around mid-route, so the injected rock is delayed until the rover has cleared that hazard zone and still has at least 18 m remaining to the goal.
fault_attribution_rule: A detection or reaction is attributable to the injected uncertainty only when the injected rock has been spawned, the rover satisfies the encounter rule, the injected rock is not farther than the baseline hazard by the configured margin, and no active monitor violation better explains the maneuver.
reaction_scope_rule: Classify reactions as baseline_only when only the baseline hazard context is active, injected_only when only the injected obstacle context is active, baseline_and_injected when both are simultaneously active, and indeterminate when neither context is strong enough to separate causality.
control_rationale_rule: Classify significant cmd_vel changes as obstacle_avoidance when reverse motion, strong turning with slowed linear speed, or large linear-speed drop occurs while obstacle context is active; classify monitor_enforcement when a monitor violation is active and motion collapses; classify goal_alignment when turning occurs without obstacle context; otherwise use unknown.
encounter_rule: The injected uncertainty is encountered when the rover is within 11 m of the injected rock and the rock lies within +/-40 degrees of the rover heading.
meaningful_evaluation_rule: The injected-autonomy outcome is meaningfully evaluable only if evaluation_window_after_encounter_s is at least 40.0 seconds.
minimum_post_encounter_observation_window_s: 40.0
artifact_consumption_rule: The scenario_contract.yaml and scenario_config.yaml files are plain YAML files parsed by the scenario driver. Launch passes their file paths and runtime toggles to the driver only as inline launch-dict ROS parameters. No plain scenario YAML file is passed to ROS as a params file.
runtime_parameter_interface:
  - parameter_name: scenario_name
    type: string
    consumer_node: scenario_driver
    source: launch file
    transport: inline_launch_dict
  - parameter_name: scenario_contract_file
    type: string
    consumer_node: scenario_driver
    source: config/scenario_contract.yaml path
    transport: inline_launch_dict
  - parameter_name: scenario_config_file
    type: string
    consumer_node: scenario_driver
    source: config/scenario_config.yaml path
    transport: inline_launch_dict
  - parameter_name: log_root_dir
    type: string
    consumer_node: scenario_driver
    source: /ws/log bind-mounted host path
    transport: inline_launch_dict
  - parameter_name: rosbag_output_dir
    type: string
    consumer_node: scenario_driver
    source: launch-computed rosbag folder for the current run
    transport: inline_launch_dict
  - parameter_name: run_id
    type: string
    consumer_node: scenario_driver
    source: launch-computed UTC timestamp
    transport: inline_launch_dict
core_metrics:
  adaptation_speed_ms: Time from obstacle injection to the first attributable obstacle-avoidance reaction.
  autonomy_reaction_status: Whether the rover produced a genuine non-nominal reaction after injection.
  observed_control_rationale: Best classification of the first significant post-injection control change.
  reaction_scope: Whether the observed maneuver is explained by baseline conditions, injected conditions, both, or cannot be separated.
  reaction_attribution_status: Whether the injected uncertainty receives causal credit for the observed maneuver.
  active_context_at_reaction: Structured snapshot of distances, progress, monitor state, and degradation state at the reaction point.
  safety_preservation: Boolean preservation state for MR_009, MR_011, and a geometry-based collision proxy.
  goal_viability: Boolean preservation state for science_rock_01 reachability and mission deadline compliance.
  recovery_rate_ms: Time from the first attributed avoidance maneuver to resumed stable forward progress.
  detection_attribution_status: Whether the first credited detection is attributable to the injected uncertainty.
  minimum_fault_distance_at_detection_m: Horizontal rover-to-rock distance at the first credited detection.
  baseline_confound_status: Whether a baseline hazard or monitor better explains a candidate event.
  injected_uncertainty_encounter_status: Whether the rover reached the spatial and heading conditions needed for the injected fault to matter.
  evaluation_window_after_encounter_s: Remaining post-encounter time before scenario termination.
  baseline_uncertainty_exercised_status: Whether block_island materially influenced rover behavior before injection.
  attribution_scope: Same scope classification used for reaction attribution.
  injected_uncertainty_source: Which injected uncertainty or uncertainties were active at the credited event.
additional_metrics:
  - name: obstacle_detection_latency_ms
    unit: ms
    description: Time from obstacle injection to the first attributed detection candidate supported by geometry and scan context.
  - name: false_obstacle_rate
    unit: ratio
    description: Fraction of degradation publications whose emitted state is unsupported by the injected obstacle geometry.
  - name: recovery_rate_ms
    unit: ms
    description: Time from the first attributed avoidance maneuver to resumed stable forward progress.
  - name: route_deviation_m
    unit: m
    description: Maximum lateral deviation from the baseline dock_pad_01 to science_rock_01 route after injection.
outcome_assessment: Generated at runtime from the injected_outcome_assessment field.
baseline_outcome_assessment: Generated at runtime from baseline uncertainty observations.
injected_outcome_assessment: Generated at runtime from encounter, reaction, recovery, safety, and goal evidence.
report: Generated at runtime under /ws/log/spacetry_scenario_navigation_obstacle_sensing_coupled/.
