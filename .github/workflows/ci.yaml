name: ci

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (linux/amd64)
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t marti:ci \
            -f docker/Dockerfile \
            --load \
            .

      - name: Run smoke test
        run: |
          docker run --rm --platform linux/amd64 \
            -v "$PWD:/ws" -w /ws \
            marti:ci bash -lc './scripts/smoke_test.sh'

