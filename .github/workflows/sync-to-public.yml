name: Sync to Public Repository

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    # Only run in the private repository (rdinizcal/SpaceTry)
    if: github.repository == 'rdinizcal/SpaceTry'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout private repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SPACETRY_SYNC_TOKEN }}

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add public repository as remote
        run: |
          git remote add public https://x-access-token:${{ secrets.SPACETRY_SYNC_TOKEN }}@github.com/gssi-robotics/SpaceTry.git

      - name: Fetch public repository
        run: |
          git fetch public main

      - name: Checkout all content from public except .github folder
        run: |
          git checkout public/main -- .
          git reset HEAD .github/
          git checkout HEAD -- .github/

      - name: Remove sync workflow from being synced to public
        run: |
          rm -f .github/workflows/sync-to-public.yml
          git add .github/

      - name: Add and commit synced changes
        run: |
          git add -A
          git commit -m "Sync content from public repository (excluding .github and sync workflow)" || echo "No changes to commit"

      - name: Push merged result to public repository
        run: |
          git push -u public HEAD:main --force-with-lease

      - name: Sync complete notification
        if: success()
        run: |
          echo "Successfully synced all content (except .github) with public repository"
