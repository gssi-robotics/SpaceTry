name: Sync to Public Repository

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout private repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SPACETRY_SYNC_TOKEN }}

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add public repository as remote
        run: |
          git remote add public https://x-access-token:${{ secrets.SPACETRY_SYNC_TOKEN }}@github.com/gssi-robotics/SpaceTry.git

      - name: Push to public repository main branch
        run: |
          git push -u public HEAD:main --force

      - name: Sync complete notification
        if: success()
        run: |
          echo "Successfully synced to public repository main branch"
